server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Whole site behind basic auth: the dashboard can trigger pipeline runs
    # and API error fields may leak internals, so nothing is public.
    auth_basic "GS-Tracker";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Re-resolve the app container's IP at request time (Docker embedded DNS).
    # Without this, nginx resolves "app" once at startup and keeps proxying to
    # the old IP after the app container is recreated (=> 502 after deploys).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    location = / {
        # Variable proxy_pass forces runtime DNS resolution (see resolver above);
        # request URI is passed through unchanged, same as "http://app:8000/".
        set $gs_app_root "http://app:8000";
        proxy_pass $gs_app_root;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $gs_app_api "http://app:8000";
        proxy_pass $gs_app_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
