server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Whole site behind basic auth: the dashboard can trigger pipeline runs
    # and API error fields may leak internals, so nothing is public.
    auth_basic "GS-Tracker";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /reports/ {
        alias /usr/share/nginx/html/reports/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        try_files $uri $uri/ =404;
    }

    location = / {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
