services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gs-tracker-app
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../output:/app/output
      - ../templates:/app/templates
    networks:
      - gs-tracker
    command: gunicorn src.web:app -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: gs-tracker-scheduler
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../output:/app/output
      - ../templates:/app/templates
    networks:
      - gs-tracker
    command: python -m src.scheduler --run-now
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'python -m src.scheduler' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: gs-tracker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../output/reports:/usr/share/nginx/html/reports:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../.htpasswd:/etc/nginx/.htpasswd:ro
      # - ./ssl:/etc/nginx/ssl:ro  # HTTPS
    depends_on:
      - app
    networks:
      - gs-tracker
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  gs-tracker:
    driver: bridge
