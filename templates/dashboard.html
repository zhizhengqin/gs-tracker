<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS-Tracker 高盛动向情报系统</title>
    <style>
        :root {
            --sidebar-w: 260px;
            --primary: #1a237e;
            --accent: #ff9800;
            --bg: #f0f2f5;
            --sidebar-bg: #121858;
            --sidebar-text: #c4c9e0;
            --sidebar-active: #fff;
            --card: #fff;
            --danger: #d32f2f;
            --success: #2e7d32;
            --warn: #e65100;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #333; display: flex; min-height: 100vh; }

        /* ====== Sidebar ====== */
        .sidebar {
            width: var(--sidebar-w); background: var(--sidebar-bg); color: var(--sidebar-text);
            display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h1 { font-size: 1.15em; color: #fff; font-weight: 700; }
        .sidebar-header .sub { font-size: 0.8em; color: #8890b5; margin-top: 4px; }

        .sidebar-section { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-section h3 { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1.5px; color: #6670a0; margin-bottom: 10px; }

        .quarter-list { list-style: none; }
        .quarter-list li {
            padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9em;
            margin-bottom: 4px; transition: all 0.15s; display: flex; justify-content: space-between; align-items: center;
        }
        .quarter-list li:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .quarter-list li.active { background: var(--accent); color: #fff; font-weight: 600; }
        .quarter-list li .badge { font-size: 0.7em; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
        .quarter-list li.active .badge { background: rgba(255,255,255,0.3); }

        .nav-tabs { list-style: none; }
        .nav-tabs li {
            padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 0.88em;
            margin-bottom: 2px; transition: all 0.15s;
        }
        .nav-tabs li:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .nav-tabs li.active { background: rgba(255,255,255,0.12); color: #fff; font-weight: 600; border-left: 3px solid var(--accent); padding-left: 11px; }

        .signal-filter { margin-top: 8px; }
        .signal-filter label { display: flex; align-items: center; gap: 8px; font-size: 0.82em; padding: 4px 0; cursor: pointer; }
        .signal-filter input[type=checkbox] { accent-color: var(--accent); }

        .sidebar-footer {
            margin-top: auto; padding: 16px 20px; font-size: 0.7em; color: #6670a0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .run-btn {
            width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
            background: var(--accent); color: #fff; font-size: 0.9em; font-weight: 600;
            cursor: pointer; transition: opacity 0.2s;
        }
        .run-btn:hover:not(:disabled) { opacity: 0.85; }
        .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .run-msg { margin-top: 8px; font-size: 0.78em; line-height: 1.4; min-height: 1em; }
        .run-msg.ok { color: #7be3a8; }
        .run-msg.err { color: #ff9a9a; }
        .run-msg.info { color: #c4c9e0; }

        /* ====== Main Content ====== */
        .main {
            margin-left: var(--sidebar-w); flex: 1; padding: 28px 32px; min-height: 100vh;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .page-header h2 { font-size: 1.5em; color: var(--primary); }
        .page-header .meta { font-size: 0.85em; color: #888; }

        .card {
            background: var(--card); border-radius: 12px; padding: 24px; margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #e8eaed;
        }
        .card h3 { font-size: 1.05em; color: var(--primary); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); display: inline-block; }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border-radius: 12px; padding: 20px; text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: 1px solid #e8eaed;
        }
        .stat-card .num { font-size: 1.8em; font-weight: 700; color: var(--primary); }
        .stat-card .label { font-size: 0.8em; color: #888; margin-top: 4px; }

        /* Signals */
        .signal-card {
            border: 1px solid #e8eaed; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
            transition: box-shadow 0.15s; cursor: default;
        }
        .signal-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .signal-card.high { border-left: 4px solid var(--danger); }
        .signal-card.medium { border-left: 4px solid var(--warn); }
        .signal-card.low { border-left: 4px solid #9e9e9e; }
        .signal-card .sig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .signal-card .sig-source {
            font-size: 0.75em; font-weight: 700; padding: 2px 8px; border-radius: 4px;
            text-transform: uppercase;
        }
        .sig-source.src-13F { background: #e3f2fd; color: #1565c0; }
        .sig-source.src-news { background: #fce4ec; color: #c62828; }
        .sig-source.src-8-K { background: #e8f5e9; color: #2e7d32; }
        .sig-source.src-13D\/13G { background: #ede7f6; color: #6a1b9a; }
        .sig-source.src-research_view { background: #fff3e0; color: #e65100; }
        .sig-source.src-macro_view { background: #f5f5f5; color: #616161; }
        .signal-card .sig-date { font-size: 0.8em; color: #999; }
        .signal-card h4 { font-size: 0.95em; margin-bottom: 6px; }
        .signal-card .sig-summary { font-size: 0.85em; color: #666; line-height: 1.5; }
        .signal-card .sig-meta { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 0.82em; }
        .cross-badge { background: #ede7f6; color: #4527a0; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .sig-link { color: var(--accent); text-decoration: none; font-weight: 600; }
        .sig-link:hover { text-decoration: underline; }

        /* Holdings table */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #eee; }
        th { background: #f5f6f8; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }
        td { font-size: 0.9em; }
        tr:hover td { background: #fafbfc; }

        .sentiment-tag {
            display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600;
        }
        .sentiment-tag.bullish { background: #e8f5e9; color: #2e7d32; }
        .sentiment-tag.bearish { background: #fce4ec; color: #c62828; }
        .sentiment-tag.neutral { background: #f5f5f5; color: #666; }

        .confidence-bar { display: inline-block; width: 80px; height: 6px; background: #e0e0e0; border-radius: 3px; vertical-align: middle; margin-left: 8px; }
        .confidence-bar .fill { height: 100%; border-radius: 3px; background: var(--accent); }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 3em; margin-bottom: 12px; }
        .loading { text-align: center; padding: 40px; color: #999; }

        /* Daily intel view */
        .daily-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .day-selector { display: flex; gap: 6px; }
        .day-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; font-size: 0.85em; transition: all 0.15s; }
        .day-btn:hover { border-color: var(--accent); color: var(--accent); }
        .day-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
        .daily-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .daily-stats .stat-card { cursor: default; }
        .daily-stats .stat-card .num { font-size: 1.8em; font-weight: 700; color: var(--primary); }
        .daily-stats .stat-card .label { font-size: 0.8em; color: #888; margin-top: 4px; }
        .daily-feed { margin-top: 8px; }
        .daily-feed .day-divider { font-size: 0.85em; color: #999; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #eee; font-weight: 600; }
        .main-nav { list-style: none; }
        .main-nav li { padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9em; margin-bottom: 2px; transition: all 0.15s; }
        .main-nav li:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .main-nav li.active { background: var(--accent); color: #fff; font-weight: 600; }

        @media (max-width: 768px) { .daily-stats { grid-template-columns: repeat(2, 1fr); } }

        /* Settings page */
        .settings-section { margin-bottom: 28px; }
        .settings-section h3 { font-size: 1.05em; color: var(--primary); margin-bottom: 14px; }
        .source-row, .model-row { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border:1px solid #e8eaed; border-radius:8px; margin-bottom:8px; background:#fafbfc; }
        .source-row .info, .model-row .info { flex:1; }
        .source-row .name { font-weight:600; }
        .source-row .desc { font-size:0.82em; color:#888; margin-top:2px; }
        .model-row .model-name { font-weight:600; }
        .model-row .model-detail { font-size:0.8em; color:#888; margin-top:2px; }
        .toggle-btn { padding:6px 18px; border-radius:20px; border:none; cursor:pointer; font-size:0.85em; font-weight:600; transition:all 0.15s; }
        .toggle-btn.on { background:#e8f5e9; color:#2e7d32; }
        .toggle-btn.off { background:#f5f5f5; color:#999; }
        .btn-sm { padding:6px 14px; border-radius:6px; border:1px solid #ddd; cursor:pointer; font-size:0.82em; background:#fff; margin-left:6px; }
        .btn-sm.danger { border-color:#ffcdd2; color:#d32f2f; }
        .btn-sm.primary { border-color:var(--accent); color:var(--accent); }
        .btn-sm:hover { opacity:0.75; }
        .add-form { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; padding:14px; background:#f5f6f8; border-radius:8px; }
        .add-form input { padding:8px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.85em; flex:1; min-width:120px; }
        .badge-default { background:var(--accent); color:#fff; padding:2px 8px; border-radius:4px; font-size:0.7em; margin-left:6px; }
        .test-result { margin-top:6px; font-size:0.82em; padding:6px 10px; border-radius:4px; }
        .test-result.ok { background:#e8f5e9; color:#2e7d32; }
        .test-result.err { background:#fce4ec; color:#c62828; }

        /* AI analysis */
        .ai-toggle { font-size:0.82em; color:var(--accent); cursor:pointer; font-weight:600; margin-top:6px; display:inline-block; }
        .ai-toggle:hover { text-decoration:underline; }
        .ai-panel { margin-top:8px; padding:10px 14px; background:#fff8e1; border-radius:6px; font-size:0.85em; line-height:1.6; color:#555; display:none; border-left:3px solid var(--accent); }
        .ai-panel.open { display:block; }
        .daily-report-card { background:linear-gradient(135deg,#1a237e,#283593); color:#fff; border-radius:12px; padding:20px 24px; margin-top:20px; }
        .daily-report-card h3 { color:#fff; border:none; margin-bottom:12px; }
        .daily-report-card h4 { color:#ffcc80; font-size:0.95em; margin:12px 0 4px; }
        .daily-report-card p { font-size:0.9em; line-height:1.7; opacity:0.92; }
        .date-picker-row { display:flex; align-items:center; gap:10px; }
        .date-picker-row input[type=date] { padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:0.9em; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; }
            .main { margin-left: 0; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- ====== SIDEBAR ====== -->
<aside class="sidebar">
    <div class="sidebar-header">
        <h1>🏦 GS-Tracker</h1>
        <div class="sub">高盛动向情报系统</div>
    </div>

    <div class="sidebar-section">
        <h3>📍 导航</h3>
        <ul class="main-nav" id="mainNav">
            <li class="active" data-view="daily">📡 每日情报</li>
            <li data-view="quarter">📅 季度报告</li>
            <li data-view="settings">⚙️ 设置</li>
        </ul>
    </div>

    <div class="sidebar-section">
        <h3>📅 季度报告</h3>
        <ul class="quarter-list" id="quarterList">
            <li data-quarter="2026-Q2">2026-Q2 <span class="badge">最新</span></li>
            <li data-quarter="2026-Q1">2026-Q1</li>
        </ul>
    </div>

    <div class="sidebar-section" id="moduleSection" style="display:none;">
        <h3>📋 模块</h3>
        <ul class="nav-tabs" id="navTabs">
            <li class="active" data-tab="overview">📊 概览</li>
            <li data-tab="analysis">🤖 AI 分析</li>
            <li data-tab="signals">📡 多源信号</li>
            <li data-tab="holdings">📋 持仓明细</li>
        </ul>
    </div>

    <div class="sidebar-section" id="signalFilterSection" style="display:none;">
        <h3>🔍 信号筛选</h3>
        <div class="signal-filter">
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="13F"> 13F 持仓</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="8-K"> SEC 8-K</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="13D/13G"> 13D/13G</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="research_view"> 高盛研究</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="news"> 新闻</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-source" value="macro_view"> 宏观指标</label>
        </div>
        <div class="signal-filter" style="margin-top: 8px;">
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-strength" value="high"> 🔴 高优先级</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-strength" value="medium"> 🟡 中优先级</label>
            <label><input type="checkbox" checked onchange="onFilterChange()" class="filter-strength" value="low"> 🟢 低优先级</label>
        </div>
    </div>

    <div class="sidebar-section">
        <h3>⚡ 操作</h3>
        <button class="run-btn" id="runDailyBtn" onclick="runDailyIntel()">📡 手动运行每日情报</button>
        <div class="run-msg" id="runDailyMsg"></div>
        <button class="run-btn" id="runPipelineBtn" onclick="runPipeline()" style="margin-top:8px">▶️ 手动运行季度对账</button>
        <div class="run-msg" id="runPipelineMsg"></div>
    </div>

    <div class="sidebar-footer">
        GS-Tracker v1.0 · 数据来源 SEC EDGAR / RSS<br>
        本内容仅供学习参考，不构成投资建议
    </div>
</aside>

<!-- ====== MAIN CONTENT ====== -->
<main class="main" id="mainContent">
    <div class="loading">加载中...</div>
</main>

<script>
// ====== State ======
let currentQuarter = null;
let reportData = null;
let reports = [];
let dailyData = [];       // signals from /api/signals/recent
let dailyDays = 30;       // current day range
let currentView = 'daily'; // 'daily' | 'quarter'

// ====== Init ======
async function init() {
    // Bind main nav (每日情报)
    document.querySelectorAll('#mainNav li').forEach(li => {
        li.addEventListener('click', () => switchMainView(li.dataset.view));
    });

    // Bind module tabs
    document.querySelectorAll('#navTabs li').forEach(li => {
        li.addEventListener('click', () => switchTab(li.dataset.tab));
    });

    // Preload report list in background
    try {
        const resp = await fetch('/api/reports');
        reports = await resp.json();
        renderQuarterList();
        if (reports.length > 0) currentQuarter = reports[0].quarter;
    } catch(e) { console.error('Failed to load reports', e); }

    // Default: daily intel view
    await switchMainView('daily');
    syncPipelineButton();
}

let loadSeq = 0;

async function loadQuarter(quarter) {
    currentQuarter = quarter;
    const seq = ++loadSeq;
    document.getElementById('mainContent').innerHTML = '<div class="loading">加载中...</div>';

    try {
        const [reportResp, signalsResp] = await Promise.all([
            fetch(`/reports/${quarter}.html`),
            fetch(`/api/signals/${quarter}`),
        ]);
        const html = await reportResp.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // Signals come from the JSON API (404 = this quarter has no signal run yet)
        let signals = [];
        let sourceStatus = {};
        let signalsError = false;
        if (signalsResp.ok) {
            const signalData = await signalsResp.json();
            signals = Array.isArray(signalData.signals) ? signalData.signals : [];
            sourceStatus = signalData.source_status || {};
        } else if (signalsResp.status !== 404) {
            signalsError = true;
        }

        // Ignore stale responses if the user clicked another quarter meanwhile
        if (seq !== loadSeq) return;

        // Analysis and holdings are still extracted from the static HTML report
        reportData = {
            quarter: quarter,
            generated_at: extractMeta(doc, '报告生成时间'),
            sentiment: extractMeta(doc, '情绪信号'),
            confidence: extractMeta(doc, '置信度'),
            analysis: {
                summary: extractSection(doc, '总体摘要'),
                concentration: extractSection(doc, '集中度分析'),
                topHoldings: extractSection(doc, '前十大重仓股分析'),
                sector: extractSection(doc, '行业偏好'),
                signals: extractSection(doc, '交易信号'),
                risks: extractSection(doc, '风险提示'),
                retail: extractSection(doc, '散户可借鉴思路'),
            },
            keyTickers: extractTickers(doc),
            signals: signals,
            sourceStatus: sourceStatus,
            signalsError: signalsError,
            holdings: extractHoldings(doc),
        };
    } catch(e) {
        if (seq !== loadSeq) return;
        console.error('Failed to load report', e);
        reportData = null;
    }

    renderAll();
    updateQuarterListActive();
}

// ====== Manual pipeline trigger ======
function setRunMsg(text, cls) {
    const el = document.getElementById('runPipelineMsg');
    el.textContent = text;  // textContent, never innerHTML — error text is untrusted
    el.className = 'run-msg' + (cls ? ' ' + cls : '');
}

async function runPipeline() {
    const btn = document.getElementById('runPipelineBtn');
    btn.disabled = true;
    setRunMsg('正在启动…', 'info');
    try {
        const resp = await fetch('/api/pipeline/run', {method: 'POST'});
        if (resp.status === 409) {
            setRunMsg('流水线正在运行中，请稍候', 'info');
        } else if (!resp.ok) {
            setRunMsg('启动失败，请稍后重试', 'err');
            btn.disabled = false;
            return;
        } else {
            setRunMsg('⏳ 流水线运行中…（通常需要几分钟）', 'info');
        }
        pollPipelineStatus();
    } catch (e) {
        setRunMsg('网络错误，无法启动', 'err');
        btn.disabled = false;
    }
}

async function pollPipelineStatus() {
    const btn = document.getElementById('runPipelineBtn');
    while (true) {
        await new Promise(r => setTimeout(r, 5000));
        let st;
        try {
            st = await (await fetch('/api/pipeline/status')).json();
        } catch (e) {
            continue;  // transient network error — keep polling
        }
        if (st.running) {
            setRunMsg('⏳ 流水线运行中…（通常需要几分钟）', 'info');
            continue;
        }
        btn.disabled = false;
        if (st.last_error) {
            setRunMsg('❌ 运行失败：' + st.last_error, 'err');
        } else {
            setRunMsg('✅ 运行完成，正在刷新数据…', 'ok');
            await refreshReports();
            setRunMsg('✅ 数据已更新', 'ok');
        }
        return;
    }
}

// ====== Manual daily intel trigger (SSE progress) ======
function setDailyMsg(text, cls) {
    const el = document.getElementById('runDailyMsg');
    el.textContent = text;
    el.className = 'run-msg' + (cls ? ' ' + cls : '');
}

let _dailyEventSource = null;

async function runDailyIntel() {
    const btn = document.getElementById('runDailyBtn');
    btn.disabled = true;
    setDailyMsg('⏳ 正在启动…', 'info');

    // Show progress panel
    showProgressPanel();

    // Close any existing SSE connection
    if (_dailyEventSource) { _dailyEventSource.close(); _dailyEventSource = null; }

    // Use SSE for real-time progress
    _dailyEventSource = new EventSource('/api/pipeline/run-daily/stream');
    const sourceStates = {};

    _dailyEventSource.onmessage = function(e) {
        try {
            const data = JSON.parse(e.data);
            if (data.event === 'start') {
                data.sources.forEach(s => {
                    sourceStates[s] = {status: 'waiting', count: 0, error: ''};
                });
                updateProgressPanel(sourceStates);
            } else if (data.event === 'source_done') {
                sourceStates[data.source] = {status: data.status, count: data.count, error: data.error || ''};
                updateProgressPanel(sourceStates);
            } else if (data.event === 'complete') {
                _dailyEventSource.close();
                _dailyEventSource = null;
                btn.disabled = false;
                const totalNew = data.new_signals || 0;
                const hasErrors = (data.errors || []).length > 0;
                if (hasErrors) {
                    setDailyMsg('⚠️ 部分完成：' + totalNew + ' 条新信号，' + data.errors.length + ' 个源出错', 'err');
                } else {
                    setDailyMsg('✅ 情报已更新：' + totalNew + ' 条新信号', 'ok');
                }
                updateProgressPanel(sourceStates, true, data);
                // Reload daily intel view
                setTimeout(() => loadDailyIntel(dailyDays || 30), 1500);
            }
        } catch(ex) { console.error('SSE parse error', ex); }
    };

    _dailyEventSource.onerror = function(e) {
        if (_dailyEventSource) {
            _dailyEventSource.close();
            _dailyEventSource = null;
        }
        btn.disabled = false;
        setDailyMsg('❌ SSE 连接中断，请手动刷新页面查看结果', 'err');
        updateProgressPanel(sourceStates, true);
    };
}

function showProgressPanel() {

function updateProgressPanel(sourceStates, isComplete, summary) {
    const panel = document.getElementById('progressPanel');
    if (!panel) return;

    const sourceLabels = {'8-K':'SEC 8-K 重大事件','13D/13G':'13D/13G 大动作','research_view':'高盛研究观点','news':'RSS 新闻','macro_view':'FRED 宏观'};
    const statusIcons = {'waiting':'⏳','ok':'✅','error':'❌'};
    const statusColors = {'waiting':'#999','ok':'#2e7d32','error':'#d32f2f'};

    let html = '<h3 style="margin-bottom:16px;font-size:1.1em;">🔄 每日情报抓取进度</h3>';
    for (const [name, state] of Object.entries(sourceStates)) {
        const icon = statusIcons[state.status] || '⏳';
        const color = statusColors[state.status] || '#999';
        const label = sourceLabels[name] || name;
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
            <span style="font-weight:600;">${icon} ${esc(label)}</span>
            <span style="color:${color};font-size:0.9em;">
                ${state.status === 'ok' ? state.count + ' 条信号' : state.status === 'error' ? esc(state.error).substring(0,50) : '等待中'}
            </span>
        </div>`;
    }

    if (isComplete && summary) {
        html += `<div style="margin-top:16px;padding-top:12px;border-top:2px solid var(--accent);">
            <strong>📊 运行报告</strong><br>
            <span style="font-size:0.9em;">新增信号：${summary.new_signals || 0} 条</span><br>
            <span style="font-size:0.9em;">参与评分：${summary.total_scored || 0} 条</span><br>
            <span style="font-size:0.9em;color:${(summary.errors||[]).length ? 'var(--danger)' : 'var(--success)'};">${(summary.errors||[]).length ? '⚠️ ' + summary.errors.length + ' 个源出错' : '✅ 全部成功'}</span>
        </div>
        <button class="run-btn" style="margin-top:12px;" onclick="document.getElementById('progressPanel').style.display='none'">关闭</button>`;
    }

    panel.innerHTML = html;
}

// ====== Data extractors from static HTML ======
function extractMeta(doc, label) {
    const ps = doc.querySelectorAll('p');
    for (const p of ps) {
        if (p.textContent.includes(label)) {
            return p.textContent.replace(label + '：', '').replace(label + ':', '').trim();
        }
    }
    return '';
}

// Old reports merged sentiment and confidence into one <p>, so the raw strings
// can be like "偏多（科技板块）（置信度：85%）". Parse defensively.
function parseConfidence(raw) {
    if (!raw) return 0;
    const s = String(raw);
    let v = parseFloat(s.replace(/[%％]/g, ''));
    if (isNaN(v)) {
        const m = s.match(/(\d+(?:\.\d+)?)\s*[%％]/);
        v = m ? parseFloat(m[1]) : NaN;
    }
    if (isNaN(v)) return 0;
    if (v > 1) v = v / 100;
    return Math.min(Math.max(v, 0), 1);
}

function cleanSentiment(raw) {
    if (!raw) return '—';
    const s = String(raw)
        .replace(/（置信度[^）]*）/g, '')
        .replace(/\(置信度[^)]*\)/g, '')
        .trim();
    return s || '—';
}

function extractSection(doc, label) {
    const spans = doc.querySelectorAll('.label');
    for (const s of spans) {
        if (s.textContent.includes(label)) {
            return s.parentElement.textContent.replace(label + '：', '').replace(label + ':', '').trim();
        }
    }
    return '暂无数据';
}

function extractTickers(doc) {
    const h2s = doc.querySelectorAll('h2');
    for (const h2 of h2s) {
        if (h2.textContent.includes('重点标的')) {
            const card = h2.closest('.card');
            if (card) {
                const p = card.querySelector('p');
                return p ? p.textContent.split(',').map(s => s.trim()).filter(Boolean) : [];
            }
        }
    }
    return [];
}

function extractHoldings(doc) {
    const holdings = [];
    const table = doc.querySelector('table');
    if (!table) return holdings;
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 2) {
            holdings.push({
                name: cells[0].textContent.trim(),
                value: cells[1].textContent.trim(),
            });
        }
    });
    return holdings;
}

function renderSignals() {
    const container = document.getElementById('signalsContainer');
    if (!container || !reportData) return;

    const activeSources = [...document.querySelectorAll('.filter-source:checked')].map(cb => cb.value);
    const activeStrengths = [...document.querySelectorAll('.filter-strength:checked')].map(cb => cb.value);

    let filtered = reportData.signals.filter(s => {
        const srcMatch = activeSources.includes(s.source);
        const strMatch = activeStrengths.includes(s.strength);
        return srcMatch && strMatch;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>没有匹配的信号，试试调整筛选条件</p></div>';
        return;
    }

    const grouped = { high: [], medium: [], low: [] };
    filtered.forEach(s => {
        const key = Object.prototype.hasOwnProperty.call(grouped, s.strength) ? s.strength : 'low';
        grouped[key].push(s);
    });

    let html = '';
    for (const [level, signals] of Object.entries(grouped)) {
        if (signals.length === 0) continue;
        const emoji = level === 'high' ? '🔴' : level === 'medium' ? '🟡' : '🟢';
        const label = level === 'high' ? '高优先级' : level === 'medium' ? '中优先级' : '低优先级';
        html += `<div class="card"><h3>${emoji} ${label}信号 (${signals.length})</h3>`;
        signals.forEach(s => { html += renderSignalCard(s); });
        html += '</div>';
    }
    container.innerHTML = html;
}

// Escape external content (RSS/SEC-derived) before injecting into innerHTML
function esc(v) {
    return String(v ?? '').replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
}

function safeHttpUrl(u) {
    return /^https?:\/\//i.test(u || '') ? u : null;
}

function renderSignalCard(s) {
    const date = formatSignalDate(s.published_at);
    const hasCrossRefs = s.cross_refs && s.cross_refs.length > 0;
    const strength = ['high', 'medium', 'low'].includes(s.strength) ? s.strength : 'low';
    const link = safeHttpUrl(s.url);
    const companies = Array.isArray(s.companies) ? s.companies : [];
    return `
        <div class="signal-card ${strength}" data-signal-id="${esc(s.id || '')}">
            <div class="sig-header">
                <span class="sig-source ${srcClass(s.source)}">${esc(s.source)}</span>
                <span class="sig-date">${esc(date)}</span>
            </div>
            <h4>${esc(s.title)}</h4>
            <p class="sig-summary">${esc(s.summary)}</p>
            <div class="sig-meta">
                ${companies.length ? `<span>🏢 ${companies.map(esc).join(', ')}</span>` : ''}
                ${hasCrossRefs ? '<span class="cross-badge">🔗 交叉信号</span>' : ''}
                ${link ? `<a href="${esc(link)}" target="_blank" rel="noopener" class="sig-link">查看原文 →</a>` : ''}
            </div>
        </div>
    `;
}

function formatSignalDate(publishedAt) {
    if (!publishedAt) return '';
    const dt = new Date(publishedAt);
    return isNaN(dt) ? String(publishedAt).slice(0, 10) : dt.toLocaleDateString('zh-CN');
}

function renderHoldingsPanel(d) {

// ====== Daily intel view ======
async function loadDailyIntel(days) {
    dailyDays = days;
    document.getElementById('mainContent').innerHTML = '<div class="loading">加载中...</div>';

    // Highlight active day button
    document.querySelectorAll('.day-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.days) === days);
    });

    try {
        const resp = await fetch(`/api/signals/recent?days=${days}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        dailyData = json.signals || [];
    } catch (e) {
        console.error('Failed to load daily intel', e);
        dailyData = [];
    }
    renderDailyIntel();
}

function renderDailyIntel() {
    const filtered = filterDailySignals();
    const highCount = filtered.filter(s => s.strength === 'high').length;
    const sources = new Set(filtered.map(s => s.source));
    const dayLabel = {7:'最近 7 天',14:'最近 14 天',30:'最近 30 天',90:'最近 90 天'}[dailyDays] || `最近 ${dailyDays} 天`;

    if (dailyData.length === 0 && filtered.length === 0) {
        document.getElementById('mainContent').innerHTML = `
            <div class="daily-header">
                <h2>📡 每日情报</h2>
                <div class="day-selector">
                    ${[7,14,30,90].map(d => `<button class="day-btn${d===dailyDays?' active':''}" data-days="${d}" onclick="loadDailyIntel(${d})">${d} 天</button>`).join('')}
                </div>
            </div>
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>暂无最近情报</p>
                <p style="font-size:0.85em;margin-top:8px;">点击左侧「📡 手动运行每日情报」开始抓取</p>
            </div>`;
        return;
    }

    let html = `
        <div class="daily-header">
            <h2>📡 每日情报</h2>
            <div class="day-selector">
                ${[7,14,30,90].map(d => `<button class="day-btn${d===dailyDays?' active':''}" data-days="${d}" onclick="loadDailyIntel(${d})">${d} 天</button>`).join('')}
            </div>
        </div>
        <div class="daily-stats">
            <div class="stat-card"><div class="num">${filtered.length}</div><div class="label">情报总数</div></div>
            <div class="stat-card"><div class="num" style="color:var(--danger);">${highCount}</div><div class="label">高优先级</div></div>
            <div class="stat-card"><div class="num">${sources.size}</div><div class="label">活跃信号源</div></div>

        </div>

            ${filtered.map(s => renderSignalCard(s)).join('')}
        </div>`;

    document.getElementById('mainContent').innerHTML = html;
}

function filterDailySignals() {
    const activeSources = [...document.querySelectorAll('.filter-source:checked')].map(cb => cb.value);
    const activeStrengths = [...document.querySelectorAll('.filter-strength:checked')].map(cb => cb.value);
    return dailyData.filter(s => activeSources.includes(s.source) && activeStrengths.includes(s.strength));
}

function srcClass(source) {
    const m = {
        '13F': 'src-13F',
        'news': 'src-news',
        '8-K': 'src-8-K',
        '13D/13G': 'src-13D\\/13G',
        'research_view': 'src-research_view',
        'macro_view': 'src-macro_view',
    };
    return m[source] || 'src-13F';
}

            html += `<div class="source-row">
                <div class="info"><div class="name">${esc(s.label)} <span style="font-size:0.75em;color:#888;">(${esc(s.name)})</span></div>
                <div class="desc">${esc(s.description)} ${s.builtin ? '<span style="color:#888;">· 内置</span>' : '<span style="color:var(--accent);">· 自定义</span>'}</div></div>
                <button class="toggle-btn ${s.enabled?'on':'off'}" onclick="toggleSource('${esc(s.name)}',${!s.enabled})">${s.enabled?'✅ 已启用':'⏸ 已禁用'}</button>
            </div>`;
        });
    } catch(e) { html += '<p style="color:#999;">加载失败</p>'; }
    html += '</div>';

    // --- LLM models ---
    html += '<div class="settings-section"><h3>🤖 大模型设置</h3><div id="llmModelList">加载中...</div>';
    html += `<div class="add-form">
        <input id="newModelName" placeholder="模型名称（如 DeepSeek）">
        <input id="newModelBaseUrl" placeholder="Base URL（如 https://api.deepseek.com/anthropic/v1）">
        <input id="newModelToken" placeholder="Auth Token" type="password">
        <input id="newModelId" placeholder="模型ID（如 deepseek-v4-pro[1m]）">
        <button class="btn-sm primary" onclick="addLLMModel()">➕ 添加</button>
        <button class="btn-sm" onclick="testLLMModel()">🔍 测试当前填写</button>
        <div id="testResult"></div>
    </div>`;
    html += '</div>';

    document.getElementById('mainContent').innerHTML = html;
    loadLLMModelList();
}

async function loadLLMModelList() {
    const container = document.getElementById('llmModelList');
    if (!container) return;
    try {
        const resp = await fetch('/api/settings/llm-models');
        const models = await resp.json();
        if (models.length === 0) {
            container.innerHTML = '<p style="color:#999;">暂无配置的大模型。请添加至少一个模型。</p>';
            return;
        }
        container.innerHTML = models.map(m => `
            <div class="model-row">
                <div class="info">
                    <div class="model-name">${esc(m.name)} ${m.is_default ? '<span class="badge-default">默认</span>' : ''}</div>
                    <div class="model-detail">${esc(m.model_name)} · ${esc(m.base_url)} · Token: ${esc(m.auth_token_masked)}</div>
                </div>
                <div>
                    ${!m.is_default ? `<button class="btn-sm primary" onclick="setDefaultModel('${esc(m.id)}')">⭐ 设为默认</button>` : ''}
                    ${!m.is_default ? `<button class="btn-sm danger" onclick="deleteModel('${esc(m.id)}')">🗑 删除</button>` : ''}
                </div>
            </div>
        `).join('');
    } catch(e) { container.innerHTML = '<p style="color:#999;">加载失败</p>'; }
}

async function toggleSource(name, enable) {
    try {
        const resp = await fetch('/api/settings/sources');
        const sources = await resp.json();
        const updated = sources.map(s => s.name === name ? {...s, enabled: enable} : s);
        await fetch('/api/settings/sources', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated)});
        renderSettings();
    } catch(e) { alert('保存失败: ' + e); }
}

async function addLLMModel() {
    const name = document.getElementById('newModelName').value.trim();
    const baseUrl = document.getElementById('newModelBaseUrl').value.trim();
    const authToken = document.getElementById('newModelToken').value.trim();
    const modelName = document.getElementById('newModelId').value.trim();
    if (!name || !baseUrl || !authToken || !modelName) { alert('请填写所有字段'); return; }
    try {
        const resp = await fetch('/api/settings/llm-models', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name,base_url:baseUrl,auth_token:authToken,model_name:modelName})});
        if (!resp.ok) { const e=await resp.json(); alert('添加失败: '+e.detail); return; }
        document.getElementById('newModelName').value = '';
        document.getElementById('newModelBaseUrl').value = '';
        document.getElementById('newModelToken').value = '';
        document.getElementById('newModelId').value = '';
        loadLLMModelList();
    } catch(e) { alert('添加失败: ' + e); }
}

async function testLLMModel() {
    const baseUrl = document.getElementById('newModelBaseUrl').value.trim();
    const authToken = document.getElementById('newModelToken').value.trim();
    const modelName = document.getElementById('newModelId').value.trim();
    const el = document.getElementById('testResult');
    if (!baseUrl || !authToken || !modelName) { el.innerHTML='<div class="test-result err">请填写 Base URL、Auth Token 和模型ID</div>'; return; }
    el.innerHTML = '<div class="test-result" style="color:#888;">⏳ 测试中...</div>';
    try {
        const resp = await fetch('/api/settings/llm-models/test', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({base_url:baseUrl,auth_token:authToken,model_name:modelName})});
        const r = await resp.json();
        if (r.status === 'ok') el.innerHTML = `<div class="test-result ok">✅ 连通成功！响应: ${esc(r.response)}</div>`;
        else el.innerHTML = `<div class="test-result err">❌ 失败: ${esc(r.error)}</div>`;
    } catch(e) { el.innerHTML = `<div class="test-result err">❌ 网络错误: ${e}</div>`; }
}

async function setDefaultModel(id) {
    try {
        await fetch(`/api/settings/llm-models/${id}/default`, {method:'PUT'});
        loadLLMModelList();
    } catch(e) { alert('设置失败: ' + e); }
}

async function deleteModel(id) {
    if (!confirm('确定删除此模型配置？')) return;
    try {
        const resp = await fetch(`/api/settings/llm-models/${id}`, {method:'DELETE'});
        if (!resp.ok) { const e=await resp.json(); alert('删除失败: ' + e.detail); return; }
        loadLLMModelList();
    } catch(e) { alert('删除失败: ' + e); }
}

// ====== Daily intel AI analysis + date picker ======
async function analyzeSignal(signalId, title, summary, source) {
    const panel = document.getElementById('ai-' + signalId);
    if (!panel) return;
    if (panel.classList.contains('open')) { panel.classList.remove('open'); return; }
    panel.classList.add('open');
    if (panel.dataset.loaded === 'true') return;
    panel.innerHTML = '<span style="color:#888;">🤖 AI 分析中...</span>';
    try {
        const resp = await fetch(`/api/signals/${signalId}/analyze`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,summary,source})});
        if (!resp.ok) { panel.innerHTML = '<span style="color:#d32f2f;">AI 分析失败</span>'; return; }
        const r = await resp.json();
        panel.innerHTML = esc(r.analysis).replace(/\n/g, '<br>');
        panel.dataset.loaded = 'true';
    } catch(e) { panel.innerHTML = '<span style="color:#d32f2f;">网络错误</span>'; }
}

async function loadDailyReport(dateStr) {
    const container = document.getElementById('dailyReportContainer');
    if (!container) return;
    container.innerHTML = '<div class="loading">📋 生成每日报告中...</div>';
    try {
        const resp = await fetch(`/api/daily-report/${dateStr}`);
        const r = await resp.json();
        if (r.report) {
            const formatted = esc(r.report).replace(/\n/g, '<br>').replace(/## ([^<]+)/g, '<h4>$1</h4>');
            container.innerHTML = `<div class="daily-report-card"><h3>📋 ${dateStr} 每日情报摘要</h3><div>${formatted}</div></div>`;
        } else {
            container.innerHTML = '';
        }
    } catch(e) { container.innerHTML = '<p style="color:#999;">日报加载失败</p>'; }
}

// Override renderDailyIntel to add date picker + AI analysis + daily report
const _origRenderDailyIntel = renderDailyIntel;
renderDailyIntel = function() {
    _origRenderDailyIntel();

    // Add date picker to daily header
    const today = new Date().toISOString().slice(0,10);
    const header = document.querySelector('.daily-header');
    if (header) {
        const existingPicker = header.querySelector('.date-picker-row');
        if (!existingPicker) {
            const picker = document.createElement('div');
            picker.className = 'date-picker-row';
            picker.innerHTML = `<span style="font-size:0.85em;color:#888;">📅 查看日期：</span>
                <input type="date" id="dailyDatePicker" value="${today}" onchange="loadDateSignals(this.value)">
                <button class="btn-sm primary" onclick="loadDateSignals(document.getElementById('dailyDatePicker').value)">查看</button>
                <button class="btn-sm" onclick="loadDailyReport(document.getElementById('dailyDatePicker').value)">📋 生成日报</button>`;
            header.appendChild(picker);
        }
    }

    // Add AI toggle to each signal card
    document.querySelectorAll('.signal-card').forEach(card => {
        const titleEl = card.querySelector('h4');
        if (!titleEl) return;
        const sigId = card.dataset.signalId;
        if (!sigId) return;

        // Check if AI toggle already exists
        if (card.querySelector('.ai-toggle')) return;

        const toggle = document.createElement('span');
        toggle.className = 'ai-toggle';
        toggle.textContent = '🤖 AI 解读';
        toggle.onclick = function() {
            const title = titleEl.textContent || '';
            const summaryEl = card.querySelector('.sig-summary');
            const summary = summaryEl ? summaryEl.textContent : '';
            const sourceEl = card.querySelector('.sig-source');
            const source = sourceEl ? sourceEl.textContent : '';
            analyzeSignal(sigId, title, summary, source);
        };
        card.appendChild(toggle);

        const panel = document.createElement('div');
        panel.className = 'ai-panel';
        panel.id = 'ai-' + sigId;
        card.appendChild(panel);
    });

    // Daily report container
    let reportContainer = document.getElementById('dailyReportContainer');
    if (!reportContainer) {
        reportContainer = document.createElement('div');
        reportContainer.id = 'dailyReportContainer';
        const feed = document.querySelector('.daily-feed');
        if (feed) feed.appendChild(reportContainer);
    }
};

async function loadDateSignals(dateStr) {
    dailyDays = null;  // custom date mode
    document.getElementById('mainContent').innerHTML = '<div class="loading">加载中...</div>';
    try {
        const resp = await fetch(`/api/signals/date/${dateStr}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        dailyData = json.signals || [];

        // Build custom view for this date
        const filtered = filterDailySignals();
        const highCount = filtered.filter(s => s.strength === 'high').length;
        const sources = new Set(filtered.map(s => s.source));

        let html = `<div class="daily-header">
            <h2>📡 ${dateStr} 情报</h2>
            <div class="date-picker-row">
                <span style="font-size:0.85em;color:#888;">📅 查看日期：</span>
                <input type="date" id="dailyDatePicker" value="${dateStr}" onchange="loadDateSignals(this.value)">
                <button class="btn-sm primary" onclick="loadDateSignals(document.getElementById('dailyDatePicker').value)">查看</button>
                <button class="btn-sm" onclick="loadDailyReport(document.getElementById('dailyDatePicker').value)">📋 生成日报</button>
            </div>
        </div>
        <div class="daily-stats">
            <div class="stat-card"><div class="num">${filtered.length}</div><div class="label">当日情报</div></div>
            <div class="stat-card"><div class="num" style="color:var(--danger);">${highCount}</div><div class="label">高优先级</div></div>
            <div class="stat-card"><div class="num">${sources.size}</div><div class="label">活跃信号源</div></div>
            <div class="stat-card"><div class="num" style="font-size:1.2em;">${dateStr}</div><div class="label">查看日期</div></div>
        </div>
        <div class="daily-feed">${filtered.map(s => renderSignalCard(s)).join('')}</div>
        <div id="dailyReportContainer"></div>`;

        document.getElementById('mainContent').innerHTML = html;

        // Add AI toggles
        document.querySelectorAll('.signal-card').forEach(card => {
            const sigId = card.dataset.signalId;
            if (!sigId) return;
            const titleEl = card.querySelector('h4');
            if (!titleEl) return;
            if (card.querySelector('.ai-toggle')) return;
            const toggle = document.createElement('span');
            toggle.className = 'ai-toggle';
            toggle.textContent = '🤖 AI 解读';
            toggle.onclick = function() {
                const title = titleEl.textContent || '';
                const summaryEl = card.querySelector('.sig-summary');
                const summary = summaryEl ? summaryEl.textContent : '';
                const sourceEl = card.querySelector('.sig-source');
                const source = sourceEl ? sourceEl.textContent : '';
                analyzeSignal(sigId, title, summary, source);
            };
            card.appendChild(toggle);
            const panel = document.createElement('div');
            panel.className = 'ai-panel';
            panel.id = 'ai-' + sigId;
            card.appendChild(panel);
        });
    } catch(e) { document.getElementById('mainContent').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>加载失败: ' + e.message + '</p></div>'; }
}

// ====== Boot ======
init();
